version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai-image-server
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - HF_API_KEY=${HF_API_KEY}
      - MONGODB_URL=${MONGODB_URL}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    restart: unless-stopped
    networks:
      - ai-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ai-image-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge
